{{- if .Values.pluginsEnabled -}}
{{- if ((.Values.plugins).retrohunt).enabled }}

apiVersion: batch/v1
kind: CronJob
metadata:
  name: plugin-retrohunt
  labels:
    part-of: azul
    section: plugins
    component: retrohunt
spec:
  schedule: "{{ .Values.plugins.retrohunt.schedule }}"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2

  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: plugin-retrohunt
            allow-egress-dispatcher: "true"
            allow-egress-https: "true"
            part-of: azul
            section: plugins
            component: retrohunt
        spec:
          restartPolicy: OnFailure

          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- include "harden.deployment" . | nindent 10 }}

          #volumes:
          #  - name: tmp
          #    emptyDir: {}

          containers:
            - name: retrohunt-cron
              #volumeMounts:
              #  - name: tmp
              #    mountPath: /tmp

              image: {{ include "image.custom" (dict "images" .Values.images "name" "plugin-retrohunt") }}
              imagePullPolicy: {{ .Values.images.pullPolicy }}

              command: ["azul-plugin-retrocron"]

              {{- include "harden.container" . | nindent 14 }}
              
              envFrom:
                - configMapRef:
                    name: plugin-standard
                - configMapRef:
                    name: plugin-retrohunt

              env:
                - name: PLUGIN_DEPLOYMENT_KEY
                  value: plugin-retrohunt
                - name: REDIS_HOST
                  value: '{{ (split ":" .Values.external.redis.endpoint)._0 }}'
                - name: REDIS_PORT
                  value: '{{ (split ":" .Values.external.redis.endpoint)._1 }}'
                - name: REDIS_DB
                  value: "{{ .Values.external.redis.db }}"
                - name: REDIS_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.secrets.redis }}"
                      key: redis-username
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.secrets.redis }}"
                      key: redis-password
                - name: REDIS_CLEANUP_DELAY
                  value: "{{ .Values.external.redis.cleanup_delay }}"
                - name: REDIS_CLEANUP_RUNNING_DELAY
                  value: "{{ .Values.external.redis.cleanup_running_delay }}"
                - name: REDIS_TTL
                  value: "{{ .Values.external.redis.ttl }}"
                - name: REDIS_EXCEPTION_WAIT
                  value: "{{ .Values.external.redis.exception_wait }}"  


{{- end }}
{{- end }}